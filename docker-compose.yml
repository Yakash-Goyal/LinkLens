services:
  api:
    build:
      context: ./backend
    environment:
      PORT: 5000
      PUBLIC_BASE_URL: http://localhost:5000
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/linklens
      MONGO_URI: mongodb://mongo:27017/linklens
      IP_HASH_SALT: change-this-for-production
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - mongo

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linklens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
